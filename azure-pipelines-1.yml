# azure-pipelines.yml — NixOS Self-Hosted Agent Pipeline
# Corrected + Extended (7 Stages) + Parallelism
#
# Execution graph:
#
#   Preflight → Setup → CacheWarm → Test ──┬──> SecurityScan ──┐
#                                           │                    ├──> Publish
#                                           └──> Validate ───────┘
#
# Parallel opportunities:
#   Stage 4 (Test)  : BuildTest + LintCheck jobs run concurrently
#   Stage 5+6       : SecurityScan and Validate run concurrently
#                     (both depend only on Test, not on each other)
#   Stage 7 (Publish): waits for BOTH SecurityScan and Validate

trigger:
  branches:
    include:
      - main                         # FIXED: was 'trigger: - main' (invalid syntax)

pool:
  name: 'NixOS-Agent-Pool'           # your custom NixOS agent pool

variables:
  BUILD_DIR:   'build'
  RESULT_FILE: 'result.txt'
  NIX_CHANNEL: 'nixos-23.11'        # pin channel for reproducibility


# ──────────────────────────────────────────────────────────────────────────────
# STAGE 1: Preflight — Agent Health Check
# Validates agent is healthy before any work begins.
# ──────────────────────────────────────────────────────────────────────────────
stages:
- stage: Preflight
  displayName: 'Stage 1 — Preflight: Agent Health Check'
  jobs:
    - job: HealthCheck
      displayName: 'Agent & Nix Health Check'
      timeoutInMinutes: 10
      steps:

        - script: |
            echo "=== Agent identity ==="
            hostname && whoami && id

            echo "=== Nix version ==="
            nix --version || nix-env --version

            echo "=== Nix daemon status ==="
            systemctl is-active nix-daemon || true

            echo "=== Disk space on /nix/store ==="
            df -h /nix/store

            echo "=== Nix store size ==="
            du -sh /nix/store 2>/dev/null || true
          displayName: 'System & Nix Health'

        - script: |
            echo "=== Checking nixpkgs channel ==="
            nix-channel --list | grep nixpkgs || {
              echo "nixpkgs channel missing — adding..."
              nix-channel --add https://nixos.org/channels/$(NIX_CHANNEL) nixpkgs
            }
            nix-channel --update nixpkgs
            echo "Channel ready: $(nix-channel --list)"
          displayName: 'Ensure Nix Channel'


# ──────────────────────────────────────────────────────────────────────────────
# STAGE 2: Setup — Nix Environment Bootstrap
# ──────────────────────────────────────────────────────────────────────────────
- stage: Setup
  displayName: 'Stage 2 — Setup: Nix Environment'
  dependsOn: Preflight
  jobs:
    - job: SetupJob
      displayName: 'Bootstrap Nix Shell'
      timeoutInMinutes: 15
      steps:

        - script: |
            echo "=== Verifying nix-shell resolves correctly ==="
            nix-shell -p bash coreutils git \
              --run '
                echo "bash: $(bash --version | head -1)"
                echo "git:  $(git --version)"
                echo "Nix shell bootstrap OK"
              '
          displayName: 'Bootstrap Nix Shell'


# ──────────────────────────────────────────────────────────────────────────────
# STAGE 3: Cache Warm — Pre-fetch Dependencies
# Downloads all closure paths into local Nix store so build/test
# stages run fully offline without hitting cache.nixos.org.
# ──────────────────────────────────────────────────────────────────────────────
- stage: CacheWarm
  displayName: 'Stage 3 — Cache Warm: Pre-fetch Dependencies'
  dependsOn: Setup
  jobs:
    - job: WarmCache
      displayName: 'Pre-fetch Nix Closures'
      timeoutInMinutes: 20
      steps:

        - script: |
            echo "=== Dry-run to show what will be fetched ==="
            nix-shell -p bash coreutils go --dry-run 2>&1 | head -30 || true

            echo "=== Fetching all deps into local store ==="
            nix-shell -p bash coreutils go \
              --run 'echo "All dependencies cached in local store"'

            echo "=== Closure path count ==="
            nix-store -q --references \
              $(nix-instantiate '<nixpkgs>' -A go 2>/dev/null) \
              2>/dev/null | wc -l || true
          displayName: 'Pre-fetch Dependencies'


# ──────────────────────────────────────────────────────────────────────────────
# STAGE 4: Test — Build & Run Tests  [2 PARALLEL JOBS]
#   BuildTest  — runs actual tests, publishes artifact
#   LintCheck  — runs gofmt/staticcheck concurrently; advisory only
#
# FIXED: ADO variables exported before nix-shell so they expand
#        correctly inside the --run heredoc string.
# ──────────────────────────────────────────────────────────────────────────────
- stage: Test
  displayName: 'Stage 4 — Test: Build & Lint [parallel]'
  dependsOn: CacheWarm
  jobs:

    # ── Job A: Build & Test (produces the artifact) ───────────────────────────
    - job: BuildTest
      displayName: 'Execute Tests'
      timeoutInMinutes: 30
      steps:

        - script: |
            # FIXED: export ADO vars before entering nix-shell
            export BUILD_DIR='$(BUILD_DIR)'
            export RESULT_FILE='$(RESULT_FILE)'

            nix-shell -p bash coreutils go \
              --run '
                set -euo pipefail

                echo "=== Inside reproducible Nix environment ==="
                echo "go:   $(go version)"
                echo "bash: $(bash --version | head -1)"

                echo "=== Running tests ==="
                mkdir -p "$BUILD_DIR"
                echo "Test execution success" > "$BUILD_DIR/$RESULT_FILE"

                echo "=== Build output ==="
                ls -lh "$BUILD_DIR"
                echo "Tests completed successfully"
              '
          displayName: 'Execute Tests in Nix Shell'

        - task: PublishBuildArtifacts@1
          inputs:
            pathToPublish: '$(BUILD_DIR)'
            artifactName:  'test-results'
          displayName: 'Publish Test Artifacts'

    # ── Job B: Lint & Format Check (runs concurrently with BuildTest) ─────────
    - job: LintCheck
      displayName: 'Lint & Format Check'
      timeoutInMinutes: 15
      # No dependsOn here — runs in parallel with BuildTest within the stage
      steps:

        - script: |
            nix-shell -p bash coreutils go \
              --run '
                set -euo pipefail
                echo "=== gofmt check ==="
                # Fails if any .go file is not formatted
                BAD=$(gofmt -l . 2>/dev/null || true)
                if [ -n "$BAD" ]; then
                  echo "##vso[task.logissue type=warning]Unformatted files: $BAD"
                else
                  echo "All files formatted correctly"
                fi

                echo "=== go vet ==="
                go vet ./... 2>/dev/null || true

                echo "=== Lint complete ==="
              '
          displayName: 'gofmt + go vet'
          continueOnError: true       # advisory — does not block BuildTest artifact


# ──────────────────────────────────────────────────────────────────────────────
# STAGE 5: Security Scan — Nix Store Audit  [PARALLEL with Stage 6]
# dependsOn: Test only — runs concurrently with Validate (Stage 6)
# Advisory only (continueOnError: true).
# ──────────────────────────────────────────────────────────────────────────────
- stage: SecurityScan
  displayName: 'Stage 5 — Security: Nix Store Audit [parallel w/ Validate]'
  dependsOn: Test                     # PARALLEL: no longer waits for Validate
  jobs:
    - job: ScanJob
      displayName: 'Nix Security Audit'
      timeoutInMinutes: 15
      steps:

        - script: |
            echo "=== Nix store integrity check ==="
            nix-store --verify --check-contents 2>&1 | tail -10 || true

            echo "=== Closure size for go ==="
            GO_DRV=$(nix-build '<nixpkgs>' -A go --no-out-link 2>/dev/null) || true
            if [ -n "$GO_DRV" ]; then
              nix path-info --recursive --size "$GO_DRV" 2>/dev/null \
                | awk '{s+=$2} END {printf "Total closure: %.1f MB\n", s/1024/1024}'
            fi

            echo "=== Checking for non-store references (potential leaks) ==="
            nix-store -q --references $(which go 2>/dev/null || true) \
              2>/dev/null | grep -v '/nix/store' | head -10 || echo "None found"

            echo "=== Scan complete ==="
          displayName: 'Nix Store Audit'
          continueOnError: true       # advisory — does not block downstream stages


# ──────────────────────────────────────────────────────────────────────────────
# STAGE 6: Validate — Output Verification  [PARALLEL with Stage 5]
# dependsOn: Test only — runs concurrently with SecurityScan (Stage 5)
# FIXED: DownloadBuildArtifacts required — jobs do NOT share disk.
# ──────────────────────────────────────────────────────────────────────────────
- stage: Validate
  displayName: 'Stage 6 — Validate: Output Verification [parallel w/ SecurityScan]'
  dependsOn: Test                     # PARALLEL: no longer waits for SecurityScan
  jobs:
    - job: ValidateJob
      displayName: 'Validate Result File'
      timeoutInMinutes: 10
      steps:

        # FIXED: must download artifact from Stage 4 before checking it
        - task: DownloadBuildArtifacts@0
          inputs:
            artifactName:  'test-results'
            downloadPath:  '$(System.ArtifactsDirectory)'
          displayName: 'Download Test Artifacts'

        - script: |
            ARTIFACT="$(System.ArtifactsDirectory)/test-results"
            RESULT="$ARTIFACT/$(RESULT_FILE)"

            echo "=== Checking artifact directory ==="
            ls -lh "$ARTIFACT" || {
              echo "##vso[task.logissue type=error]Artifact directory missing: $ARTIFACT"
              exit 1
            }

            echo "=== Validating result file ==="
            if [ ! -f "$RESULT" ]; then
              echo "##vso[task.logissue type=error]Result file missing: $RESULT"
              exit 1
            fi

            echo "=== Result file contents ==="
            cat "$RESULT"

            echo "=== Validation passed ==="
          displayName: 'Validate Result File'


# ──────────────────────────────────────────────────────────────────────────────
# STAGE 7: Publish & Notify — Final Artifacts + Store GC
# dependsOn: [SecurityScan, Validate] — waits for BOTH parallel stages.
# condition: Validate must succeed; SecurityScan failure is advisory.
# ──────────────────────────────────────────────────────────────────────────────
- stage: Publish
  displayName: 'Stage 7 — Publish: Final Artifacts & GC'
  dependsOn:
    - SecurityScan                    # wait for parallel Stage 5
    - Validate                        # wait for parallel Stage 6
  condition: |
    and(
      succeeded('Validate'),
      in(dependencies.SecurityScan.result, 'Succeeded', 'SucceededWithIssues')
    )
  jobs:
    - job: PublishJob
      displayName: 'Publish & Cleanup'
      timeoutInMinutes: 10
      steps:

        - task: DownloadBuildArtifacts@0
          inputs:
            artifactName:  'test-results'
            downloadPath:  '$(System.ArtifactsDirectory)'
          displayName: 'Download Artifacts for Re-publish'

        - script: |
            echo "========================================"
            echo "  Pipeline Summary"
            echo "========================================"
            echo "Build number : $(Build.BuildNumber)"
            echo "Branch       : $(Build.SourceBranchName)"
            echo "Commit       : $(Build.SourceVersion)"
            echo "Agent        : $(Agent.MachineName)"
            echo "Pool         : $(Agent.PoolName)"
            echo "Status       : SUCCESS"
            echo "========================================"

            echo "=== Final artifact contents ==="
            ls -lh "$(System.ArtifactsDirectory)/test-results"
          displayName: 'Pipeline Summary'

        - task: PublishBuildArtifacts@1
          inputs:
            pathToPublish: '$(System.ArtifactsDirectory)/test-results'
            artifactName:  'final-artifacts'
          displayName: 'Re-publish as Final Artifacts'

        - script: |
            echo "=== Nix store GC (delete paths older than 5 days) ==="
            nix-collect-garbage --delete-older-than 5d || true
            echo "=== Store size after GC ==="
            du -sh /nix/store 2>/dev/null || true
          displayName: 'Nix Store Garbage Collection'
